rollingMaxUnavailable: 1

meshConfig: # https://istio.io/latest/docs/reference/config/istio.mesh.v1alpha1/
  enableTracing: true
  defaultConfig:
    tracing:
      sampling: 100.0 # default is "1.0"
  extensionProviders:
    - name: otel-tracing
      opentelemetry:
        service: otlp-collector.otel-otlp-collector.svc.cluster.local
        port: 4317
        resource_detectors:
          environment: {}
