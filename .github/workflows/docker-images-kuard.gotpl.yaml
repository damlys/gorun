name: docker/images/kuard
on:
  pull_request:
    paths:
      - "docker/images/kuard/**"
      - "!docker/images/kuard/README.md"
  push:
    branches:
      - main
    paths:
      - "docker/images/kuard/**"
      - "!docker/images/kuard/README.md"
      - "!docker/images/kuard/container-structure-test.yaml"
jobs:
  docker-images-kuard:
    name: docker/images/kuard
    runs-on: ubuntu-22.04
    container: ghcr.io/damlys/gorun-devcontainer:0.0.0
    permissions:
      contents: write
      id-token: write
      packages: write
    env:
      GITHUB_OWNER: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DOCKER_BUILDKIT: 1
    steps:
      - name: git clone
        uses: actions/checkout@v3
      - run: git config --system --add safe.directory /__w/gorun/gorun
      - name: gcloud auth
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: projects/715614799977/locations/global/workloadIdentityPools/github/providers/github-actions
          service_account: gha-damlys-gorun@gorun-general-2.iam.gserviceaccount.com
          create_credentials_file: true
          export_environment_variables: true
          cleanup_credentials: true
      - name: docker auth (Google Artifact Registry)
        run: gcloud auth configure-docker "europe-central2-docker.pkg.dev"
      - name: docker auth (Docker Hub)
        uses: docker/login-action@v2
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: docker auth (GitHub Packages)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: docker buildx
        uses: docker/setup-buildx-action@v2
      - name: build
        run: ./scripts/docker-image build "kuard"
      - name: test
        run: ./scripts/docker-image test "kuard"
      - name: publish
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: ./scripts/docker-image publish "kuard"
      - name: show
        run: ./scripts/docker-image show "kuard"
